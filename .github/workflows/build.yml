name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # required to publish a release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PS2EXE module
        shell: powershell
        run: |
          Install-Module ps2exe -Scope CurrentUser -Force -AllowClobber

      - name: Generate icon (if missing)
        shell: powershell
        run: |
          if (-not (Test-Path 'assets\icon.ico')) {
            .\Generate-Icon.ps1
          }

      - name: Build EXE
        shell: powershell
        run: |
          .\Build-Exe.ps1

      - name: Verify EXE
        shell: powershell
        run: |
          if (-not (Test-Path 'build\WinGetManager.exe')) {
            Write-Error "Build failed - no exe found"
            exit 1
          }
          $size = (Get-Item 'build\WinGetManager.exe').Length / 1KB
          Write-Host "EXE: $size KB"

      - name: Upload as artifact (each commit)
        uses: actions/upload-artifact@v4
        with:
          name: WinGetManager-${{ github.sha }}
          path: |
            build/WinGetManager.exe
            build/config/settings.json
          retention-days: 30

      # ── Releases only on git tag (vX.Y.Z) ─────────────────────────────────
      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          choco install innosetup --no-progress -y

      - name: Build setup installer
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" installer\WinGetManager.iss

          # Also produce a stable filename (without version) for the /releases/latest/download/ URL
          Copy-Item "release\WinGetManager-Setup-$version.exe" "release\WinGetManager-Setup.exe"

      - name: Build portable zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}"
          $bundleDir = "release\WinGetManager-$version-portable"
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
          Copy-Item 'build\WinGetManager.exe' $bundleDir
          Copy-Item -Recurse 'build\config' $bundleDir
          Copy-Item 'README.md' $bundleDir
          Copy-Item 'LICENSE' $bundleDir

          # Versioned archive name
          Compress-Archive -Path "$bundleDir\*" -DestinationPath "release\WinGetManager-$version-portable.zip" -Force
          # Stable name for /releases/latest/download/ URL
          Copy-Item "release\WinGetManager-$version-portable.zip" "release\WinGetManager-portable.zip"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/WinGetManager.exe
            release/WinGetManager-Setup-*.exe
            release/WinGetManager-Setup.exe
            release/WinGetManager-${{ github.ref_name }}-portable.zip
            release/WinGetManager-portable.zip
          generate_release_notes: true
          draft: false
          prerelease: false
