name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # nodig om release te maken
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PS2EXE module installeren
        shell: powershell
        run: |
          Install-Module ps2exe -Scope CurrentUser -Force -AllowClobber

      - name: Icoon genereren (als die er nog niet is)
        shell: powershell
        run: |
          if (-not (Test-Path 'assets\icon.ico')) {
            .\Generate-Icon.ps1
          }

      - name: EXE bouwen
        shell: powershell
        run: |
          .\Build-Exe.ps1

      - name: Verifieer EXE
        shell: powershell
        run: |
          if (-not (Test-Path 'build\WinGetManager.exe')) {
            Write-Error "Build mislukt - geen exe gevonden"
            exit 1
          }
          $size = (Get-Item 'build\WinGetManager.exe').Length / 1KB
          Write-Host "EXE: $size KB"

      - name: Upload als artifact (elke commit)
        uses: actions/upload-artifact@v4
        with:
          name: WinGetManager-${{ github.sha }}
          path: |
            build/WinGetManager.exe
            build/config/settings.json
          retention-days: 30

      # ── Releases alleen bij git tag (vX.Y.Z) ──────────────────────────────
      - name: Inno Setup installeren
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          choco install innosetup --no-progress -y

      - name: Setup-installer bouwen
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" installer\WinGetManager.iss

          # Maak ook stabiele filename (zonder versie) voor /releases/latest/download/ URL
          Copy-Item "release\WinGetManager-Setup-$version.exe" "release\WinGetManager-Setup.exe"

      - name: Portable zip maken
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}"
          $bundleDir = "release\WinGetManager-$version-portable"
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
          Copy-Item 'build\WinGetManager.exe' $bundleDir
          Copy-Item -Recurse 'build\config' $bundleDir
          Copy-Item 'README.md' $bundleDir
          Copy-Item 'LICENSE' $bundleDir

          # Versioned naam voor archief
          Compress-Archive -Path "$bundleDir\*" -DestinationPath "release\WinGetManager-$version-portable.zip" -Force
          # Stabiele naam voor /releases/latest/download/ URL
          Copy-Item "release\WinGetManager-$version-portable.zip" "release\WinGetManager-portable.zip"

      - name: GitHub Release publiceren
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/WinGetManager.exe
            release/WinGetManager-Setup-*.exe
            release/WinGetManager-Setup.exe
            release/WinGetManager-${{ github.ref_name }}-portable.zip
            release/WinGetManager-portable.zip
          generate_release_notes: true
          draft: false
          prerelease: false
